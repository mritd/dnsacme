<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="DNSACME">
  <title>DNSACME</title>
  <!--
    DNSACME app icon. Flat-polished "verified certificate" seal in the Synology
    DSM system-app style: emerald scalloped badge, top gloss, inset coin rim,
    a checkmark (valid cert) and the ACME wordmark. Master source; small-size
    PNGs (<=32px) render a simplified variant (gentle scallop, bolder check, no
    wordmark) for crisp edges. Green = valid TLS.
  -->
  <defs>
    <linearGradient id="badge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1FD79E"/>
      <stop offset="0.5" stop-color="#0BA673"/>
      <stop offset="1" stop-color="#046A47"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.32"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
