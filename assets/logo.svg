    <clipPath id="sealClip"><use href="#seal"/></clipPath>
    <filter id="badgeShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#003018" flood-opacity="0.30"/>
    </filter>
    <filter id="markShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00311e" flood-opacity="0.24"/>
    </filter>
  </defs>

  <!-- seal body + depth -->
  <g filter="url(#badgeShadow)"><use href="#seal" fill="url(#badge)"/></g>
  <g clip-path="url(#sealClip)">
    <use href="#seal" fill="url(#gloss)"/>
    <g transform="translate(128 128) scale(0.85) translate(-128 -128)">
      <use href="#seal" fill="none" stroke="#ffffff" stroke-opacity="0.28" stroke-width="4.5"/>
    </g>
  </g>

  <!-- valid-certificate check + ACME wordmark -->
  <path d="M99 116 l19 21 l39 -46" fill="none" stroke="#ffffff" stroke-width="15" stroke-linecap="round" stroke-linejoin="round" filter="url(#markShadow)"/>
  <text x="128" y="180" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-weight="700" font-size="26" letter-spacing="2" fill="#ffffff" filter="url(#markShadow)">ACME</text>
</svg>
