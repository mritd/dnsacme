version: '3'

tasks:
  clean:
    desc: Clean Build Dir
    cmds:
      - rm -rf build
    status:
      - test ! -d build

  mkdir:
    desc: Create Build Dir
    cmds:
      - mkdir -p build
    status:
      - test -d build

  build-dnsacme:
    desc: Build dnsacme
    label: build-{{.TASK}}
    vars:
      DNSACME_COMMIT:
        sh: git rev-parse HEAD
    cmds:
      - task: mkdir
      - |
        GOOS={{.GOOS}} GOARCH={{.GOARCH}} GOARM={{.GOARM}} GOMIPS={{.GOMIPS}} \
        go build -trimpath -o build/dnsacme-{{.TASK}} -ldflags \
        "-w -s -X main.commit={{.DNSACME_COMMIT}}" {{.CLI_ARGS}}

  linux-386:
    desc: Build dnsacme(linux/386)
    cmds:
      - task: build-dnsacme
        vars: {
          TASK: "{{.TASK}}",
          GOOS: linux,
          GOARCH: 386
        }
  linux-amd64:
    desc: Build dnsacme(linux/amd64)
    cmds:
      - task: build-dnsacme
        vars: {
          TASK: "{{.TASK}}",
          GOOS: linux,
          GOARCH: amd64
        }
  linux-amd64-v3:
    desc: Build dnsacme(linux/amd64-v3)
    cmds:
      - task: build-dnsacme
        vars: {
          TASK: "{{.TASK}}",
          GOOS: linux,
          GOARCH: amd64,
          GOAMD64: v3
        }
  linux-amd64-v4:
    desc: Build dnsacme(linux/amd64-v4)
    cmds:
      - task: build-dnsacme
        vars: {
          TASK: "{{.TASK}}",
          GOOS: linux,
          GOARCH: amd64,
          GOAMD64: v4
        }
  linux-armv5:
    desc: Build dnsacme(linux/armv5)
    cmds:
      - task: build-dnsacme
        vars: {
          TASK: "{{.TASK}}",
          GOOS: linux,
          GOARCH: arm,
          GOARM: 5
        }
  linux-armv6:
    desc: Build dnsacme(linux/armv6)
    cmds:
      - task: build-dnsacme
        vars: {
          TASK: "{{.TASK}}",
          GOOS: linux,
          GOARCH: arm,
          GOARM: 6
        }
  linux-armv7:
    desc: Build dnsacme(linux/armv7)
    cmds:
      - task: build-dnsacme
        vars: {
          TASK: "{{.TASK}}",
          GOOS: linux,
          GOARCH: arm,
          GOARM: 7
        }
  linux-arm64:
    desc: Build dnsacme(linux/arm64)
    cmds:
      - task: build-dnsacme
        vars: {
          TASK: "{{.TASK}}",
          GOOS: linux,
          GOARCH: arm64
        }
  linux-mips-hardfloat:
    desc: Build dnsacme(linux/mips-hardfloat)
    cmds:
      - task: build-dnsacme
        vars: {
          TASK: "{{.TASK}}",
          GOOS: linux,
          GOARCH: mips,
          GOMIPS: hardfloat
        }
  linux-mipsle-softfloat:
    desc: Build dnsacme(linux/mipsle-softfloat)
    cmds:
      - task: build-dnsacme
        vars: {
          TASK: "{{.TASK}}",
          GOOS: linux,
          GOARCH: mipsle,
          GOMIPS: softfloat
        }
  linux-mipsle-hardfloat:
    desc: Build dnsacme(linux/mipsle-hardfloat)
    cmds:
      - task: build-dnsacme
        vars: {
          TASK: "{{.TASK}}",
          GOOS: linux,
          GOARCH: mipsle,
          GOMIPS: hardfloat
        }
  linux-mips64:
    desc: Build dnsacme(linux/mips64)
    cmds:
      - task: build-dnsacme
        vars: {
          TASK: "{{.TASK}}",
          GOOS: linux,
          GOARCH: mips64
        }
  linux-mips64le:
    desc: Build dnsacme(linux/mips64le)
    cmds:
      - task: build-dnsacme
        vars: {
          TASK: "{{.TASK}}",
          GOOS: linux,
          GOARCH: mips64le
        }

  release:
    cmds:
      - task: clean
      - task: linux-386
      - task: linux-amd64
      - task: linux-amd64-v3
      - task: linux-amd64-v4
      - task: linux-armv5
      - task: linux-armv6
      - task: linux-armv7
      - task: linux-arm64
      - task: linux-mips-hardfloat
      - task: linux-mipsle-softfloat
      - task: linux-mips64
      - task: linux-mips64le

  synology:
    desc: Build Synology packages for common DSM architectures
    vars:
      OUT: build/synology
    cmds:
      - |
        build_pkg() {
          arch="$1"
          goamd64="$2"
          dsm_arch="$3"
          work="{{.OUT}}/work-${arch}"
          pkg="{{.OUT}}/dnsacme-${arch}.spk"

          # DSM installs an outer uncompressed SPK containing package.tgz,
          # lifecycle scripts, package metadata, and privilege declarations.
          rm -rf "$work"
          mkdir -p "$work/package/bin" "$work/package/scripts" "$work/package/ui" "$work/conf" "{{.OUT}}"
          GOOS=linux GOARCH="$arch" GOAMD64="$goamd64" CGO_ENABLED=0 \
            go build -trimpath -ldflags "-s -w" -o "$work/package/bin/dnsacme" .
          cp -R synology/spk/conf/. "$work/conf/"
          # Go and DSM use different architecture tokens. Render one architecture
          # per SPK so Package Center cannot install the wrong binary artifact.
          sed "s/^arch=.*/arch=\"${dsm_arch}\"/" synology/spk/INFO > "$work/package/INFO"
          cp -R synology/spk/scripts/. "$work/package/scripts/"
          cp -R synology/spk/ui/. "$work/package/ui/"
          # synonotify templates are embedded into the binary (go:embed) and the
          # one-time root `synology publish-notifications` command publishes them
          # into /var/cache/texts/DNSACME, so package.tgz ships no separate
          # notification directory.
          chmod +x "$work/package/scripts/start-stop-status"
          chmod +x "$work/package/scripts/preupgrade" "$work/package/scripts/postupgrade"
          chmod +x "$work/package/scripts/postuninst"
          chmod +x "$work/package/ui/api.cgi"
          (cd "$work/package" && tar -czf package.tgz bin ui)
          mv "$work/package/package.tgz" "$work/package.tgz"
          cp "$work/package/INFO" "$work/INFO"
          # Package Center reads icons from base64 INFO fields before package.tgz
          # is unpacked, so embed both launcher sizes in the outer manifest.
          {
            printf 'package_icon="%s"\n' "$(base64 < synology/spk/PACKAGE_ICON.PNG | tr -d '\n')"
            printf 'package_icon_256="%s"\n' "$(base64 < synology/spk/PACKAGE_ICON_256.PNG | tr -d '\n')"
          } >> "$work/INFO"
          cp -R "$work/package/scripts" "$work/scripts"
          (cd "$work" && tar -cf "../dnsacme-${arch}.spk" INFO package.tgz scripts conf)
          echo "$pkg"
        }

        build_pkg amd64 v2 x86_64
        build_pkg arm64 "" aarch64

  gofmt:
    cmds:
      - go install golang.org/x/tools/cmd/goimports@latest
      - gofmt -s -w .
      - goimports -w .

  govulncheck:
    desc: vulnerability detection
    cmds:
      - go install golang.org/x/vuln/cmd/govulncheck@v1.1.1
      - govulncheck ./...

  default:
    cmds:
      - task: build-dnsacme
        vars: {
          TASK: "local"
        }
