version: '3'

tasks:
  clean:
    desc: Clean Build Dir
    cmds:
      - rm -rf build
    status:
      - test ! -d build

  mkdir:
    desc: Create Build Dir
    cmds:
      - mkdir -p build
    status:
      - test -d build

  build-dnsacme:
    desc: Build dnsacme
    label: build-{{.TASK}}
    vars:
      DNSACME_COMMIT:
        sh: if [ -n "${DNSACME_BUILD_VERSION:-}" ]; then printf '%s\n' "$DNSACME_BUILD_VERSION"; else git rev-parse HEAD; fi
    cmds:
      - task: mkdir
      - |
        GOOS={{.GOOS}} GOARCH={{.GOARCH}} GOARM={{.GOARM}} GOAMD64={{.GOAMD64}} GOMIPS={{.GOMIPS}} \
        go build -trimpath -o build/dnsacme-{{.TASK}} -ldflags \
        "-w -s -X main.commit={{.DNSACME_COMMIT}}" {{.CLI_ARGS}}

  linux-386:
    desc: Build dnsacme(linux/386)
    cmds:
      - task: build-dnsacme
        vars: {
          TASK: "{{.TASK}}",
          GOOS: linux,
          GOARCH: 386
        }
  linux-amd64:
    desc: Build dnsacme(linux/amd64)
    cmds:
      - task: build-dnsacme
        vars: {
          TASK: "{{.TASK}}",
          GOOS: linux,
          GOARCH: amd64
        }
  linux-amd64-v3:
    desc: Build dnsacme(linux/amd64-v3)
    cmds:
      - task: build-dnsacme
        vars: {
          TASK: "{{.TASK}}",
          GOOS: linux,
          GOARCH: amd64,
          GOAMD64: v3
        }
  linux-amd64-v4:
    desc: Build dnsacme(linux/amd64-v4)
    cmds:
      - task: build-dnsacme
        vars: {
          TASK: "{{.TASK}}",
          GOOS: linux,
          GOARCH: amd64,
          GOAMD64: v4
        }
  linux-armv5:
    desc: Build dnsacme(linux/armv5)
    cmds:
      - task: build-dnsacme
        vars: {
          TASK: "{{.TASK}}",
          GOOS: linux,
          GOARCH: arm,
          GOARM: 5
        }
  linux-armv6:
    desc: Build dnsacme(linux/armv6)
    cmds:
      - task: build-dnsacme
        vars: {
          TASK: "{{.TASK}}",
          GOOS: linux,
          GOARCH: arm,
          GOARM: 6
        }
  linux-armv7:
    desc: Build dnsacme(linux/armv7)
    cmds:
      - task: build-dnsacme
        vars: {
          TASK: "{{.TASK}}",
          GOOS: linux,
          GOARCH: arm,
          GOARM: 7
        }
  linux-arm64:
    desc: Build dnsacme(linux/arm64)
    cmds:
      - task: build-dnsacme
        vars: {
          TASK: "{{.TASK}}",
          GOOS: linux,
          GOARCH: arm64
        }
  linux-mips-hardfloat:
    desc: Build dnsacme(linux/mips-hardfloat)
    cmds:
      - task: build-dnsacme
        vars: {
          TASK: "{{.TASK}}",
          GOOS: linux,
          GOARCH: mips,
          GOMIPS: hardfloat
        }
  linux-mipsle-softfloat:
    desc: Build dnsacme(linux/mipsle-softfloat)
    cmds:
      - task: build-dnsacme
        vars: {
          TASK: "{{.TASK}}",
          GOOS: linux,
          GOARCH: mipsle,
          GOMIPS: softfloat
        }
  linux-mipsle-hardfloat:
    desc: Build dnsacme(linux/mipsle-hardfloat)
    cmds:
      - task: build-dnsacme
        vars: {
          TASK: "{{.TASK}}",
          GOOS: linux,
          GOARCH: mipsle,
          GOMIPS: hardfloat
        }
  linux-mips64:
    desc: Build dnsacme(linux/mips64)
    cmds:
      - task: build-dnsacme
        vars: {
          TASK: "{{.TASK}}",
          GOOS: linux,
          GOARCH: mips64
        }
  linux-mips64le:
    desc: Build dnsacme(linux/mips64le)
    cmds:
      - task: build-dnsacme
        vars: {
          TASK: "{{.TASK}}",
          GOOS: linux,
          GOARCH: mips64le
        }

  synology:
    desc: Build Synology packages for common DSM architectures
    cmds:
      - rm -rf build/synology
      - ./synology/build-spk.sh build

  synology-spksrc:
    desc: Reproduce a SynoCommunity package with an external spksrc checkout
    env:
      SPKSRC_TARGET: "{{.CLI_ARGS}}"
    cmds:
      - |
        set -eu

        target=${SPKSRC_TARGET:-arch-x64-7.2}
        case "$target" in
          *[[:space:]]*)
            printf 'invalid spksrc target: %s\n' "$target" >&2
            exit 1
            ;;
        esac
        if ! printf '%s\n' "$target" | grep -Eq '^arch-[a-z0-9]+-[0-9]+(\.[0-9]+)+$'; then
          printf 'invalid spksrc target: %s\n' "$target" >&2
          exit 1
        fi

        image=${SPKSRC_IMAGE:-ghcr.io/synocommunity/spksrc:latest}
        case "$image" in
          ""|-*|*[[:space:]]*)
            printf 'invalid spksrc image: %s\n' "$image" >&2
            exit 1
            ;;
        esac

        : "${SPKSRC_DIR:?set SPKSRC_DIR to an spksrc checkout}"
        case "$SPKSRC_DIR" in
          /*) spksrc_input=$SPKSRC_DIR ;;
          *) spksrc_input=$PWD/$SPKSRC_DIR ;;
        esac
        case "$spksrc_input" in
          *,*)
            printf 'SPKSRC_DIR cannot contain a comma when used with Docker --mount: %s\n' "$SPKSRC_DIR" >&2
            exit 1
            ;;
        esac
        if test -f "$spksrc_input/spk/dnsacme/Makefile"; then
          :
        else
          printf 'DNSACME package definition not found under SPKSRC_DIR: %s\n' "$SPKSRC_DIR" >&2
          exit 1
        fi
        if spksrc_dir=$(CDPATH= cd "$spksrc_input" && pwd); then
          :
        else
          printf 'cannot resolve SPKSRC_DIR: %s\n' "$SPKSRC_DIR" >&2
          exit 1
        fi

        if ! command -v docker >/dev/null 2>&1; then
          printf 'docker is required to run the spksrc build\n' >&2
          exit 1
        fi

        docker run --rm --platform=linux/amd64 \
          --mount "type=bind,source=$spksrc_dir,target=/spksrc" \
          -w /spksrc \
          -e "TAR_CMD=fakeroot tar" \
          "$image" make -C spk/dnsacme "$target"

  synology-arch-check:
    desc: Check Synology-tagged builds across supported Go architectures
    cmds:
      - |
        tmp_dir="$(mktemp -d "${TMPDIR:-/tmp}/dnsacme-synology-arch-check.XXXXXX")"
        trap 'rm -rf "$tmp_dir"' EXIT

        CGO_ENABLED=0 GOOS=linux GOARCH=386 GO386=sse2 \
          go build -tags synology -trimpath -o "$tmp_dir/dnsacme-linux-386" .
        CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=5 \
          go build -tags synology -trimpath -o "$tmp_dir/dnsacme-linux-armv5" .
        CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=7 \
          go build -tags synology -trimpath -o "$tmp_dir/dnsacme-linux-armv7" .
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 GOAMD64=v1 \
          go build -tags synology -trimpath -o "$tmp_dir/dnsacme-linux-amd64-v1" .
        CGO_ENABLED=0 GOOS=linux GOARCH=arm64 GOARM64=v8.0 \
          go build -tags synology -trimpath -o "$tmp_dir/dnsacme-linux-arm64" .

  release-build:
    desc: Build all release assets without tagging or publishing
    cmds:
      - task: clean
      - task: synology-arch-check
      - task: linux-386
      - task: linux-amd64
      - task: linux-amd64-v3
      - task: linux-amd64-v4
      - task: linux-armv5
      - task: linux-armv6
      - task: linux-armv7
      - task: linux-arm64
      - task: linux-mips-hardfloat
      - task: linux-mipsle-softfloat
      - task: linux-mipsle-hardfloat
      - task: linux-mips64
      - task: linux-mips64le
      - task: synology

  release:
    desc: "Build, tag, push, and publish a GitHub release (usage: task release -- v1.2.3)"
    cmds:
      - ./scripts/release.sh {{.CLI_ARGS}}

  gofmt:
    cmds:
      - go install golang.org/x/tools/cmd/goimports@latest
      - gofmt -s -w .
      - goimports -w .

  govulncheck:
    desc: vulnerability detection
    cmds:
      - go install golang.org/x/vuln/cmd/govulncheck@v1.1.1
      - govulncheck ./...

  default:
    cmds:
      - task: build-dnsacme
        vars: {
          TASK: "local"
        }
